<div class="relative w-full rounded-3xl border border-app-border bg-app-card/30 backdrop-blur-md overflow-hidden p-8 md:p-12 flex flex-col lg:flex-row items-center gap-12">
  <div class="absolute -top-36 -left-36 w-72 h-72 rounded-full bg-app-accent/15 blur-3xl"></div>
  <div class="absolute -bottom-36 -right-36 w-72 h-72 rounded-full bg-purple-500/15 blur-3xl"></div>

  <div class="flex-1 text-left relative z-10 max-w-xl">
    <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold bg-app-accent/10 text-app-accent border border-app-accent/20 mb-6 uppercase tracking-wider">
      Angular 20 Standalone
    </span>
    <h1 class="text-4xl md:text-5xl font-black tracking-tight text-app-text font-krona leading-tight mb-6">
      {{ title }}
    </h1>
    <p class="text-base text-app-text/70 leading-relaxed mb-8">
      {{ subtitle }}
    </p>
    <div class="flex flex-wrap gap-4">
      <button class="px-6 py-3 rounded-xl bg-app-accent text-white font-bold text-sm uppercase tracking-wider hover:bg-app-accent/90 transition-all shadow-md shadow-app-accent/20 cursor-pointer">
        Get Started
      </button>
      <button class="px-6 py-3 rounded-xl bg-app-text/5 border border-app-border text-app-text hover:bg-app-text/10 transition-all font-bold text-sm uppercase tracking-wider cursor-pointer">
        View Code
      </button>
    </div>
  </div>

  <div class="flex-1 w-full relative z-10">
    <div class="w-full rounded-2xl bg-slate-950/80 border border-white/10 shadow-2xl p-4 font-mono text-xs text-slate-300">
      <div class="flex items-center gap-2 border-b border-white/10 pb-3 mb-3">
        <span class="w-3 h-3 rounded-full bg-red-500"></span>
        <span class="w-3 h-3 rounded-full bg-yellow-500"></span>
        <span class="w-3 h-3 rounded-full bg-green-500"></span>
        <span class="text-slate-500 ml-2">bash</span>
      </div>
      <div class="space-y-1.5">
        @for (log of terminalLogs(); track log) {
          <div class="flex items-center gap-2">
            <span class="text-purple-400">➜</span>
            <span>{{ log }}</span>
          </div>
        }
      </div>
    </div>
  </div>
</div>

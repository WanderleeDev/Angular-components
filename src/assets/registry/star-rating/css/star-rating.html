<div
  role="radiogroup"
  [attr.aria-label]="
    isReadonly() ? 'Rating (readonly)' : 'Rate this item'
  "
  [attr.aria-readonly]="isReadonly() ? 'true' : null"
  class="container-stars"
  [style.flex-direction]="
    orientation() === 'horizontal' ? 'row' : 'column'
  "
  [style.color]="backgroundColor()">
  @for (item of arrayStars(); let i = $index; track i) {
    @if (isReadonly()) {
      <svg
        [style.color]="i + 1 <= rating() ? '#fcb93d' : backgroundColor()"
        [attr.aria-label]="i + 1 <= rating() ? 'Filled star' : 'Empty star'"
        class="star-icon readonly"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 256 256">
        @if (i + 1 <= rating()) {
          <path
            fill="currentColor"
            d="m234.5 114.38l-45.1 39.36l13.51 58.6a16 16 0 0 1-23.84 17.34l-51.11-31l-51 31a16 16 0 0 1-23.84-17.34l13.49-58.54l-45.11-39.42a16 16 0 0 1 9.11-28.06l59.46-5.15l23.21-55.36a15.95 15.95 0 0 1 29.44 0L166 81.17l59.44 5.15a16 16 0 0 1 9.11 28.06Z" />
        } @else {
          <path
            fill="currentColor"
            d="M243 96a16 16 0 0 0-13-11l-59.5-5.2l-23.2-55.4a16 16 0 0 0-29.4 0L97.7 79.8L38.2 85a16 16 0 0 0-9 28.1l45.1 39.4l-13.5 58.5a16 16 0 0 0 23.8 17.3l51.1-31l51 31a16.2 16.2 0 0 0 16.3.3a16 16 0 0 0 7.5-17.6l-13.5-58.5l45.1-39.4A15.9 15.9 0 0 0 243 96Zm-77 47.7a15.9 15.9 0 0 0-5.1 15.6l11.2 48.6l-42.4-25.8a16 16 0 0 0-16.4 0l-42.4 25.8l11.2-48.6a15.9 15.9 0 0 0-5.1-15.6l-37.4-32.7l49.4-4.3a16 16 0 0 0 13.5-9.8l19.3-46.1l19.3 46.1a16 16 0 0 0 13.5 9.8l49.4 4.3Z" />
        }
      </svg>
    } @else {
      <button
        type="button"
        role="radio"
        [attr.aria-checked]="i + 1 <= rating()"
        [attr.aria-label]="'Rate ' + (i + 1) + ' star' + (i === 0 ? '' : 's')"
        [style.color]="i + 1 <= rating() ? '#fcb93d' : backgroundColor()"
        (click)="viewRating(i + 1)"
        (keydown)="handleKeyDown($event, i + 1)"
        class="star-button">
        <svg
          class="star-svg"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 256 256">
          @if (i + 1 <= rating()) {
            <path
              fill="currentColor"
              d="m234.5 114.38l-45.1 39.36l13.51 58.6a16 16 0 0 1-23.84 17.34l-51.11-31l-51 31a16 16 0 0 1-23.84-17.34l13.49-58.54l-45.11-39.42a16 16 0 0 1 9.11-28.06l59.46-5.15l23.21-55.36a15.95 15.95 0 0 1 29.44 0L166 81.17l59.44 5.15a16 16 0 0 1 9.11 28.06Z" />
          } @else {
            <path
              fill="currentColor"
              d="M243 96a16 16 0 0 0-13-11l-59.5-5.2l-23.2-55.4a16 16 0 0 0-29.4 0L97.7 79.8L38.2 85a16 16 0 0 0-9 28.1l45.1 39.4l-13.5 58.5a16 16 0 0 0 23.8 17.3l51.1-31l51 31a16.2 16.2 0 0 0 16.3.3a16 16 0 0 0 7.5-17.6l-13.5-58.5l45.1-39.4A15.9 15.9 0 0 0 243 96Zm-77 47.7a15.9 15.9 0 0 0-5.1 15.6l11.2 48.6l-42.4-25.8a16 16 0 0 0-16.4 0l-42.4 25.8l11.2-48.6a15.9 15.9 0 0 0-5.1-15.6l-37.4-32.7l49.4-4.3a16 16 0 0 0 13.5-9.8l19.3-46.1l19.3 46.1a16 16 0 0 0 13.5 9.8l49.4 4.3Z" />
          }
        </svg>
      </button>
    }
  }
</div>

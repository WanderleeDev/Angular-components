<div class="bg-app-card border border-app-border rounded-2xl p-6 shadow-sm">
  <div class="flex justify-between items-center mb-4">
    <span class="text-[0.85rem] font-bold uppercase tracking-wider text-app-text/70">{{ label() }}</span>
    <span class="text-lg font-extrabold text-[#38bdf8]">${{ lowerValue() }} - ${{ upperValue() }}</span>
  </div>

  <div class="relative w-full h-8 flex items-center">
    <!-- Track Base -->
    <div class="absolute h-[6px] w-full bg-app-text/10 rounded-full z-1"></div>
    <!-- Track Range -->
    <div
      class="absolute h-[6px] bg-[#38bdf8] rounded-full z-2"
      [style.left.%]="lowerPercent()"
      [style.right.%]="100 - upperPercent()"></div>

    <!-- Inputs -->
    <input
      type="range"
      [min]="min()"
      [max]="max()"
      [value]="lowerValue()"
      (input)="onLowerChange($event)"
      class="absolute w-full h-[6px] bg-none pointer-events-none appearance-none outline-none z-3 m-0 [&::-webkit-slider-thumb]:pointer-events-auto [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:w-[18px] [&::-webkit-slider-thumb]:h-[18px] [&::-webkit-slider-thumb]:rounded-full [&::-webkit-slider-thumb]:bg-app-text [&::-webkit-slider-thumb]:border-2 [&::-webkit-slider-thumb]:border-[#38bdf8] [&::-webkit-slider-thumb]:shadow-[0_0_8px_rgba(56,189,248,0.3)] [&::-webkit-slider-thumb]:cursor-pointer [&::-webkit-slider-thumb]:transition-all [&::-webkit-slider-thumb]:duration-100 [&::-webkit-slider-thumb]:hover:scale-115 [&::-webkit-slider-thumb]:hover:bg-[#38bdf8] [&::-moz-range-thumb]:pointer-events-auto [&::-moz-range-thumb]:w-[18px] [&::-moz-range-thumb]:h-[18px] [&::-moz-range-thumb]:rounded-full [&::-moz-range-thumb]:bg-app-text [&::-moz-range-thumb]:border-2 [&::-moz-range-thumb]:border-[#38bdf8] [&::-moz-range-thumb]:shadow-[0_0_8px_rgba(56,189,248,0.3)] [&::-moz-range-thumb]:cursor-pointer [&::-moz-range-thumb]:transition-all [&::-moz-range-thumb]:duration-100 [&::-moz-range-thumb]:hover:scale-115 [&::-moz-range-thumb]:hover:bg-[#38bdf8]" />

    <input
      type="range"
      [min]="min()"
      [max]="max()"
      [value]="upperValue()"
      (input)="onUpperChange($event)"
      class="absolute w-full h-[6px] bg-none pointer-events-none appearance-none outline-none z-3 m-0 [&::-webkit-slider-thumb]:pointer-events-auto [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:w-[18px] [&::-webkit-slider-thumb]:h-[18px] [&::-webkit-slider-thumb]:rounded-full [&::-webkit-slider-thumb]:bg-app-text [&::-webkit-slider-thumb]:border-2 [&::-webkit-slider-thumb]:border-[#38bdf8] [&::-webkit-slider-thumb]:shadow-[0_0_8px_rgba(56,189,248,0.3)] [&::-webkit-slider-thumb]:cursor-pointer [&::-webkit-slider-thumb]:transition-all [&::-webkit-slider-thumb]:duration-100 [&::-webkit-slider-thumb]:hover:scale-115 [&::-webkit-slider-thumb]:hover:bg-[#38bdf8] [&::-moz-range-thumb]:pointer-events-auto [&::-moz-range-thumb]:w-[18px] [&::-moz-range-thumb]:h-[18px] [&::-moz-range-thumb]:rounded-full [&::-moz-range-thumb]:bg-app-text [&::-moz-range-thumb]:border-2 [&::-moz-range-thumb]:border-[#38bdf8] [&::-moz-range-thumb]:shadow-[0_0_8px_rgba(56,189,248,0.3)] [&::-moz-range-thumb]:cursor-pointer [&::-moz-range-thumb]:transition-all [&::-moz-range-thumb]:duration-100 [&::-moz-range-thumb]:hover:scale-115 [&::-moz-range-thumb]:hover:bg-[#38bdf8]" />
  </div>

  <div class="flex justify-between text-xs font-semibold text-app-text/40 mt-2">
    <span>${{ min() }}</span>
    <span>${{ max() }}</span>
  </div>
</div>

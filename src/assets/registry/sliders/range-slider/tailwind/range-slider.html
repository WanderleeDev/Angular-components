<div class="bg-app-card border border-app-border rounded-2xl p-6 shadow-sm">
  <div class="flex justify-between items-center mb-4">
    <span class="text-[0.85rem] font-bold uppercase tracking-wider text-app-text/70">{{ label() }}</span>
    <span class="text-xl font-extrabold text-[#38bdf8]">{{ value() }}%</span>
  </div>

  <div class="relative w-full h-8 flex items-center">
    <input
      type="range"
      [min]="min()"
      [max]="max()"
      [step]="step()"
      [value]="value()"
      (input)="onSliderChange($event)"
      class="appearance-none w-full h-[6px] rounded-full outline-none cursor-pointer transition-all duration-100 [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:w-5 [&::-webkit-slider-thumb]:h-5 [&::-webkit-slider-thumb]:rounded-full [&::-webkit-slider-thumb]:bg-app-text [&::-webkit-slider-thumb]:border-2 [&::-webkit-slider-thumb]:border-[#38bdf8] [&::-webkit-slider-thumb]:shadow-[0_0_10px_rgba(56,189,248,0.3)] [&::-webkit-slider-thumb]:cursor-pointer [&::-webkit-slider-thumb]:transition-all [&::-webkit-slider-thumb]:duration-100 [&::-webkit-slider-thumb]:hover:scale-120 [&::-webkit-slider-thumb]:hover:bg-[#38bdf8] [&::-moz-range-thumb]:w-5 [&::-moz-range-thumb]:h-5 [&::-moz-range-thumb]:rounded-full [&::-moz-range-thumb]:bg-app-text [&::-moz-range-thumb]:border-2 [&::-moz-range-thumb]:border-[#38bdf8] [&::-moz-range-thumb]:shadow-[0_0_10px_rgba(56,189,248,0.3)] [&::-moz-range-thumb]:cursor-pointer [&::-moz-range-thumb]:transition-all [&::-moz-range-thumb]:duration-100 [&::-moz-range-thumb]:hover:scale-120 [&::-moz-range-thumb]:hover:bg-[#38bdf8]"
      [style.background]="'linear-gradient(to right, var(--accent, #38bdf8) ' + percentage() + '%, var(--border, rgba(255, 255, 255, 0.08)) ' + percentage() + '%)'" />
  </div>

  <div class="flex justify-between text-xs font-semibold text-app-text/40 mt-2">
    <span>{{ min() }}%</span>
    <span>{{ max() }}%</span>
  </div>
</div>

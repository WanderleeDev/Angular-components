<footer class="bg-app-card border border-app-border rounded-2xl p-6 shadow-sm">
  <div class="flex flex-col md:flex-row items-center justify-between gap-5 text-center md:text-left">
    <div class="text-[0.8rem] font-medium text-app-text/50">
      <span>&copy; {{ year() }} {{ companyName() }}. All rights reserved.</span>
    </div>

    <div class="flex gap-6">
      @for (link of links(); track link) {
      <a href="#" (click)="$event.preventDefault()" class="no-underline text-[0.8rem] font-semibold text-app-text/60 hover:text-[#38bdf8] transition-colors duration-200">{{ link }}</a>
      }
    </div>

    <div class="flex gap-3">
      <a href="#" (click)="$event.preventDefault()" class="bg-app-text/[0.02] border border-app-border text-app-text/60 w-9 h-9 rounded-xl flex items-center justify-center hover:bg-app-text/[0.05] hover:border-[#38bdf8] hover:text-[#38bdf8] hover:-translate-y-0.5 transition-all duration-200" aria-label="Github">
        <span class="material-icons text-[1.1rem]">code</span>
      </a>
      <a href="#" (click)="$event.preventDefault()" class="bg-app-text/[0.02] border-app-border text-app-text/60 w-9 h-9 rounded-xl flex items-center justify-center hover:bg-app-text/[0.05] hover:border-[#38bdf8] hover:text-[#38bdf8] hover:-translate-y-0.5 transition-all duration-200" aria-label="Twitter">
        <span class="material-icons text-[1.1rem]">chat</span>
      </a>
      <a href="#" (click)="$event.preventDefault()" class="bg-app-text/[0.02] border-app-border text-app-text/60 w-9 h-9 rounded-xl flex items-center justify-center hover:bg-app-text/[0.05] hover:border-[#38bdf8] hover:text-[#38bdf8] hover:-translate-y-0.5 transition-all duration-200" aria-label="LinkedIn">
        <span class="material-icons text-[1.1rem]">business</span>
      </a>
    </div>
  </div>
</footer>

<div class="@container max-w-4xl mx-auto px-4 py-4">
  <div class="accordion-grid grid grid-cols-1 @[700px]:grid-cols-2 border border-app-border/40 rounded-2xl overflow-hidden shadow-lg bg-app-card">
    <!-- Accordion Entries -->
    <div class="p-8 flex flex-col justify-center divide-y divide-app-border/40 @[700px]:border-r @[700px]:border-app-border/40">
      @for (item of items(); track item.title; let index = $index) {
      <details
        class="group"
        [attr.name]="exclusive() ? 'demo-accordion' : null"
        [attr.open]="index === 0 ? '' : null">
        <summary class="flex items-center justify-between gap-4 py-5 font-bold text-app-text/65 cursor-pointer select-none transition-opacity duration-200 hover:text-app-text/90 group-open:text-app-accent group-open:opacity-100 [&::-webkit-details-marker]:hidden">
          <span>{{ item.title }}</span>
          <svg
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            class="w-5 h-5 flex-shrink-0 opacity-50 transition-all duration-300 group-open:rotate-45 group-open:opacity-100 group-open:text-app-accent"
            viewBox="0 0 24 24">
            <path d="M12 5v14m-7-7h14" />
          </svg>
        </summary>
        <p class="pb-5 text-sm text-app-text/80 leading-relaxed">{{ item.content }}</p>
      </details>
      }
    </div>

    <!-- Images Side -->
    <div class="relative overflow-hidden bg-black/5 select-none pointer-events-none">
      @for (item of items(); track item.title; let index = $index) {
      <img
        [class.accordion-img-1]="index === 0"
        [class.accordion-img-2]="index === 1"
        [class.accordion-img-3]="index === 2"
        [class.accordion-img-4]="index === 3"
        class="absolute inset-0 w-full h-full object-cover transition-all duration-[400ms] ease-[cubic-bezier(0.4,0,0.2,1)] opacity-0 scale-[1.08]"
        [src]="item.image"
        [alt]="item.title"
        (error)="onImageError($event)" />
      }
      <img
        class="accordion-img-default absolute inset-0 w-full h-full object-cover transition-all duration-[400ms] ease-[cubic-bezier(0.4,0,0.2,1)] opacity-0 scale-[1.08]"
        [src]="baseThumbnail()"
        alt="Default Showcase"
        loading="lazy" />
    </div>
  </div>
</div>

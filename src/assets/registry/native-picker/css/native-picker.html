<div class="picker-wrapper">
  <!-- Label -->
  @if (label()) {
    <label class="picker-label">
      {{ label() }}
    </label>
  }

  <!-- Interactive Trigger Container -->
  <div 
    [class]="containerClasses()"
    (click)="triggerPicker($event)">
    
    <!-- Background Glow effect for Hover/Focus -->
    <div class="picker-glow"></div>

    <!-- Content Wrapper -->
    <div class="picker-content">
      <!-- Icon (Left) -->
      <span class="material-icons picker-icon">
        {{ resolvedIcon() }}
      </span>

      <!-- Value Display / Placeholder -->
      <div class="picker-value-wrapper">
        <span class="picker-value" [class.empty]="!value()">
          {{ formattedValue() }}
        </span>
      </div>

      <!-- Color Preview Pill (if color picker) -->
      @if (type() === 'color' && value()) {
        <div 
          class="picker-color-preview"
          [style.background-color]="value()">
        </div>
      }

      <!-- Chevron/Dropdown Indicator -->
      @if (type() !== 'color') {
        <span class="material-icons picker-chevron">
          unfold_more
        </span>
      }
    </div>

    <!-- Hidden Native Input overlaying the entire trigger container -->
    <input
      #nativeInput
      [type]="type()"
      [value]="value()"
      [min]="min()"
      [max]="max()"
      [disabled]="disabled()"
      (input)="onInputChange($event)"
      (change)="onInputChange($event)"
      class="native-hidden-input"
      [attr.aria-label]="label() || placeholder() || type()"
    />
  </div>
</div>

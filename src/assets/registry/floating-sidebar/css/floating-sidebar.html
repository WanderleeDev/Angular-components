<aside class="floating-sidebar" [class.collapsed]="isCollapsed()">
  <div class="sidebar-header">
    <div class="brand">
      <span class="material-icons brand-logo">blur_on</span>
      @if (!isCollapsed()) {
      <span class="brand-name">Aero</span>
      }
    </div>
    <button type="button" class="collapse-btn" (click)="toggleCollapse()" aria-label="Toggle sidebar collapse">
      <span class="material-icons">{{ isCollapsed() ? 'keyboard_double_arrow_right' : 'keyboard_double_arrow_left' }}</span>
    </button>
  </div>

  <nav class="sidebar-nav">
    <a href="javascript:void(0)" class="nav-item" [class.active]="activeIndex() === 0" (click)="setActive(0)">
      <span class="material-icons">dashboard</span>
      @if (!isCollapsed()) {
      <span class="nav-text">Dashboard</span>
      }
    </a>
    <a href="javascript:void(0)" class="nav-item" [class.active]="activeIndex() === 1" (click)="setActive(1)">
      <span class="material-icons">folder_open</span>
      @if (!isCollapsed()) {
      <span class="nav-text">Projects</span>
      }
    </a>
    <a href="javascript:void(0)" class="nav-item" [class.active]="activeIndex() === 2" (click)="setActive(2)">
      <span class="material-icons">bar_chart</span>
      @if (!isCollapsed()) {
      <span class="nav-text">Analytics</span>
      }
    </a>
    <a href="javascript:void(0)" class="nav-item" [class.active]="activeIndex() === 3" (click)="setActive(3)">
      <span class="material-icons">forum</span>
      @if (!isCollapsed()) {
      <span class="nav-text">Messages</span>
      <span class="badge">5</span>
      }
    </a>
    <a href="javascript:void(0)" class="nav-item" [class.active]="activeIndex() === 4" (click)="setActive(4)">
      <span class="material-icons">settings</span>
      @if (!isCollapsed()) {
      <span class="nav-text">Settings</span>
      }
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="user-info">
      <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=80&auto=format&fit=crop&q=60" alt="Avatar" class="avatar" />
      @if (!isCollapsed()) {
      <div class="user-details">
        <span class="user-name">Olivia</span>
        <span class="user-role">Admin</span>
      </div>
      }
    </div>
  </div>
</aside>

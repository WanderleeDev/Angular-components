<nav
  class="w-full bg-app-card border border-app-border rounded-xl shadow-lg relative overflow-hidden font-sans">
  <div class="flex items-center justify-between px-5 py-3 gap-6">
    <!-- Brand Section -->
    <div class="flex items-center gap-2">
      <button
        type="button"
        class="flex items-center justify-center bg-transparent border-none text-app-text/80 hover:bg-app-text/5 hover:text-app-text cursor-pointer p-1 rounded-lg transition-all lg:hidden"
        (click)="toggleMobile()"
        aria-label="Toggle menu">
        <span class="material-icons">menu</span>
      </button>
      <div class="flex items-center gap-2 text-app-text cursor-pointer">
        <span class="material-icons text-app-accent text-2xl">local_mall</span>
        <span class="font-extrabold text-[1.15rem] tracking-tight"
          >NovaShop</span
        >
      </div>
    </div>

    <!-- Search Section (Desktop) -->
    <div class="hidden md:block flex-1 max-w-2xl">
      <div class="relative flex items-center w-full group">
        <span
          class="material-icons absolute left-3.5 text-app-text/40 text-xl pointer-events-none group-focus-within:text-app-accent transition-colors"
          >search</span
        >
        <input
          type="text"
          placeholder="Search products, brands..."
          class="w-full py-2.5 pl-10 pr-12 bg-app-text/4 border border-white/10 rounded-full text-app-text text-sm transition-all duration-200 focus:bg-app-text/[0.06] focus:border-app-accent focus:shadow-[0_0_0_3px_rgba(236,72,153,0.15)] focus:outline-none placeholder:text-app-text/35" />
        <span
          class="absolute right-3.5 text-[0.7rem] font-bold bg-app-text/8 text-app-text/50 border border-white/5 px-1.5 py-0.5 rounded-md pointer-events-none"
          >⌘K</span
        >
      </div>
    </div>

    <!-- Actions Section -->
    <div class="flex items-center gap-2">
      <button
        type="button"
        class="md:hidden flex items-center justify-center bg-transparent border-none text-app-text/70 hover:bg-app-text/5 hover:text-app-text p-2 rounded-full cursor-pointer transition-all"
        aria-label="Search">
        <span class="material-icons">search</span>
      </button>
      <button
        type="button"
        class="flex items-center justify-center bg-transparent border-none text-app-text/70 hover:bg-app-text/5 hover:text-app-text p-2 rounded-full cursor-pointer transition-all"
        aria-label="Wishlist">
        <span class="material-icons">favorite_border</span>
      </button>
      <button
        type="button"
        class="relative flex items-center justify-center bg-transparent border-none text-app-text/70 hover:bg-app-text/5 hover:text-app-text p-2 rounded-full cursor-pointer transition-all"
        aria-label="Shopping Cart">
        <span class="material-icons">shopping_bag</span>
        <span
          class="absolute top-0.5 right-0.5 bg-app-accent text-white text-[0.65rem] font-extrabold min-w-[14px] h-[14px] rounded-full flex items-center justify-center px-0.5 shadow-[0_0_0_2px_var(--card-bg,#0b0f19)]"
          >3</span
        >
      </button>
      <div
        class="ml-1 cursor-pointer rounded-full p-0.5 border-2 border-transparent hover:border-app-accent transition-colors">
        <img
          src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=80&auto=format&fit=crop&q=60"
          alt="Profile"
          class="w-7 h-7 rounded-full object-cover block" />
      </div>
    </div>
  </div>

  <!-- Mobile Drawer -->
  @if (isMobileMenuOpen()) {
  <div
    class="bg-app-text/[0.02] border-t border-white/10 p-4 flex flex-col gap-3 transition-all duration-300 ease-out starting:opacity-0 starting:-translate-y-2">
    <div class="block md:hidden">
      <div class="relative flex items-center w-full group">
        <span
          class="material-icons absolute left-3.5 text-app-text/40 text-xl pointer-events-none group-focus-within:text-app-accent transition-colors"
          >search</span
        >
        <input
          type="text"
          placeholder="Search products..."
          class="w-full py-2.5 px-10 bg-app-text/[0.04] border border-white/10 rounded-full text-app-text text-sm transition-all duration-200 focus:bg-app-text/[0.06] focus:border-app-accent focus:shadow-[0_0_0_3px_rgba(236,72,153,0.15)] focus:outline-none placeholder:text-app-text/35" />
      </div>
    </div>
    <div class="flex flex-col gap-1">
      @for (link of navLinks; track link) {
      <a
        href="#"
        (click)="$event.preventDefault()"
        class="no-underline text-sm font-[550] text-app-text/70 hover:text-app-text hover:bg-app-text/5 px-3 py-2.5 rounded-lg transition-all"
        >{{ link }}</a
      >
      }
    </div>
  </div>
  }
</nav>

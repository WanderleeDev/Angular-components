<nav class="tabs-nav-wrapper">
  <div class="tabs-nav-container">
    <!-- Brand logo -->
    <div class="tabs-nav-brand">
      <span class="material-icons brand-logo">terminal</span>
      <span class="brand-name">{{ logoText() }}</span>
    </div>

    <!-- Tabs Container -->
    <div class="tabs-list-wrapper">
      <div class="tabs-list">
        @for (tab of tabs(); track tab) {
          <button 
            (click)="selectTab(tab)" 
            type="button" 
            class="tab-btn" 
            [class.active]="activeTab() === tab">
            {{ tab }}
          </button>
        }
      </div>
    </div>

    <!-- Status badge / indicator -->
    <div class="tabs-nav-status">
      <span class="status-dot"></span>
      <span class="status-text">Production Live</span>
    </div>
  </div>
</nav>

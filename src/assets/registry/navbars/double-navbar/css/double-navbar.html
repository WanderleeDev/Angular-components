<header class="double-header">
  <div class="top-bar">
    <div class="top-container">
      <div class="contact-info">
        <span class="material-icons text-sm">phone</span>
        <span>+1 (555) 019-2834</span>
      </div>
      <div class="utility-links">
        <a href="javascript:void(0)" class="utility-link">Support</a>
        <a href="javascript:void(0)" class="utility-link">Find a Store</a>
        <div class="lang-selector">
          <span class="material-icons text-sm">language</span>
          <span>EN</span>
        </div>
      </div>
    </div>
  </div>

  <nav class="main-nav">
    <div class="nav-container">
      <div class="nav-brand">
        <div class="brand-logo">
          <span class="material-icons">architecture</span>
        </div>
        <span class="brand-name">Nexus</span>
      </div>

      <div class="nav-links">
        @for (link of navLinks; track link) {
        <a href="#" (click)="$event.preventDefault(); activeLink.set(link)" class="nav-link" [class.active]="activeLink() === link">{{ link }}</a>
        }
      </div>

      <div class="nav-actions">
        <button type="button" class="btn-text">Log In</button>
        <button type="button" class="btn-solid">Launch App</button>
      </div>

      <button
        type="button"
        class="mobile-toggle"
        (click)="toggleMobile()"
        aria-label="Toggle menu">
        <span class="material-icons"
          >{{ isMobileOpen() ? 'close' : 'menu' }}</span
        >
      </button>
    </div>

    @if (isMobileOpen()) {
    <div class="mobile-menu">
      @for (link of navLinks; track link) {
      <a href="#" (click)="$event.preventDefault(); activeLink.set(link)" class="mobile-link" [class.active]="activeLink() === link">{{ link }}</a>
      }
      <div class="mobile-actions">
        <button type="button" class="btn-text w-full">Log In</button>
        <button type="button" class="btn-solid w-full">Launch App</button>
      </div>
    </div>
    }
  </nav>
</header>

<nav class="navbar-wrapper">
  <div class="navbar-container">
    <!-- Logo -->
    <div class="navbar-brand">
      <span class="material-icons brand-icon">blur_on</span>
      <span class="brand-text">{{ logoText() }}</span>
    </div>

    <!-- Desktop Menu Links -->
    <div class="desktop-menu">
      @for (link of links(); track link) {
        <a href="javascript:void(0)" class="nav-link">{{ link }}</a>
      }
    </div>

    <!-- Action Button / User profile -->
    <div class="navbar-actions">
      <button type="button" class="btn-primary">Get Started</button>

      <!-- Mobile Hamburger Button -->
      <button (click)="toggleMobileMenu()" type="button" class="hamburger-btn" aria-label="Toggle menu">
        <span class="material-icons">{{ isMobileMenuOpen() ? 'close' : 'menu' }}</span>
      </button>
    </div>
  </div>

  <!-- Mobile Dropdown Menu -->
  @if (isMobileMenuOpen()) {
    <div class="mobile-dropdown animate-fade-in">
      @for (link of links(); track link) {
        <a href="javascript:void(0)" (click)="isMobileMenuOpen.set(false)" class="mobile-nav-link">{{ link }}</a>
      }
      <button type="button" class="btn-primary-mobile">Get Started</button>
    </div>
  }
</nav>

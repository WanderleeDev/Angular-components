<div class="bg-app-card border border-app-border rounded-2xl p-6 shadow-sm">
  <h3 class="text-[0.9rem] font-bold uppercase tracking-wider text-app-text/70 mb-5 pb-3 border-b border-app-border">{{ title() }}</h3>

  <ul class="list-none p-0 m-0 flex flex-col gap-3">
    @for (item of items(); track item.label) {
    <li class="flex items-center gap-4 px-4 py-3 rounded-xl bg-app-text/[0.01] border border-transparent hover:bg-app-text/[0.03] hover:border-[#38bdf8]/15 hover:translate-x-1 transition-all duration-250 cursor-pointer group">
      <div class="w-8 h-8 rounded-lg bg-app-text/[0.03] border border-app-border flex items-center justify-center group-hover:bg-[#38bdf8] group-hover:border-[#38bdf8] transition-all duration-250 shrink-0">
        <span class="material-icons text-[1.1rem] text-app-text/80 group-hover:text-[#070a13] transition-colors duration-250">{{ item.icon }}</span>
      </div>

      <span class="text-[0.9rem] font-medium text-app-text/85 flex-grow">{{ item.label }}</span>

      @if (item.badge) {
      <span class="text-[0.65rem] font-bold px-2 py-0.5 rounded-full uppercase tracking-wide"
        [class]="item.badgeType === 'primary' ? 'text-[#38bdf8] bg-[rgba(56,189,248,0.15)]' :
                 item.badgeType === 'success' ? 'text-emerald-400 bg-emerald-400/15' :
                 'text-rose-400 bg-rose-400/15'">
        {{ item.badge }}
      </span>
      }
    </li>
    }
  </ul>
</div>

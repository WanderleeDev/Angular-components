<div class="bg-app-card border border-app-border rounded-2xl overflow-hidden">
  <div class="px-6 py-5 border-b border-app-border/40 bg-app-text/[0.01]">
    <h3 class="text-base font-bold text-app-text tracking-tight">{{ title() }}</h3>
    <p class="text-xs text-app-text/50 font-medium mt-0.5">{{ description() }}</p>
  </div>

  <dl class="m-0 p-0">
    @for (field of fields(); track field.key; let isOdd = $odd) {
    <div class="grid grid-cols-1 sm:grid-cols-[1fr_2fr] sm:gap-6 px-6 py-4 border-b border-app-border/[0.04] last:border-b-0 hover:bg-app-text/[0.02] transition-colors duration-200"
         [class.bg-app-text/[0.005]]="isOdd">
      <dt class="text-[0.85rem] font-bold text-app-text/60">{{ field.key }}</dt>
      <dd class="text-[0.85rem] font-semibold text-app-text mt-1 sm:mt-0">{{ field.val }}</dd>
    </div>
    }
  </dl>
</div>

<div class="bg-app-card border border-app-border rounded-2xl px-8 py-12 overflow-hidden">
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
    <div class="flex flex-col items-start text-left">
      <div class="mb-6">
        <span class="text-xs font-bold uppercase tracking-wider text-[#38bdf8] bg-[rgba(56,189,248,0.1)] border border-[rgba(56,189,248,0.2)] px-3 py-1 rounded-full">{{ badgeText() }}</span>
      </div>

      <h1 class="text-4xl sm:text-5xl font-[850] text-app-text leading-[1.15] mb-5 tracking-[-0.03em]">{{ title() }}</h1>
      <p class="text-[0.95rem] leading-relaxed text-app-text/70 mb-8 max-w-[30rem]">{{ description() }}</p>

      <div class="flex gap-4 flex-wrap">
        <button type="button" class="bg-[#38bdf8] text-[#070a13] border-none px-7 py-3 rounded-xl text-[0.9rem] font-semibold cursor-pointer transition-all duration-200 shadow-[0_4px_12px_rgba(56,189,248,0.25)] hover:-translate-y-px hover:brightness-110 hover:shadow-[0_6px_18px_rgba(56,189,248,0.35)]">{{ ctaText1() }}</button>
        <button type="button" class="bg-app-text/[0.02] border border-app-border text-app-text px-7 py-3 rounded-xl text-[0.9rem] font-semibold cursor-pointer transition-all duration-200 hover:bg-app-text/[0.05] hover:border-app-text/15 hover:-translate-y-px">{{ ctaText2() }}</button>
      </div>
    </div>

    <div class="flex justify-center items-center relative w-full">
      <div class="relative w-full max-w-[320px] h-[220px] flex justify-center items-center">
        <div class="absolute w-[250px] h-[250px] rounded-full bg-[radial-gradient(circle,rgba(56,189,248,0.12)_0%,transparent_70%)] pointer-events-none animate-pulse"></div>
        <div class="bg-[rgba(15,23,42,0.6)] border border-app-border rounded-2xl w-full p-4 shadow-[0_10px_30px_rgba(0,0,0,0.3)] z-10 -rotate-3 hover:rotate-0 hover:scale-102 transition-transform duration-300">
          <div class="flex gap-[0.35rem] mb-5">
            <span class="w-2 h-2 rounded-full bg-red-500 opacity-60"></span>
            <span class="w-2 h-2 rounded-full bg-amber-500 opacity-60"></span>
            <span class="w-2 h-2 rounded-full bg-emerald-500 opacity-60"></span>
          </div>
          <div class="flex flex-col gap-3">
            <div class="h-[6px] rounded-full bg-app-text/10 w-3/4"></div>
            <div class="h-[6px] rounded-full bg-app-text/10 w-1/2"></div>
            <div class="h-[6px] rounded-full bg-app-text/10 w-5/6"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

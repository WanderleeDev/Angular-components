<div class="max-w-7xl mx-auto px-4 sm:px-6 pb-12 pt-8">
  <div class="text-center mb-10 max-w-2xl mx-auto">
    <h1 class="text-3xl font-extrabold text-app-text tracking-tight mb-2">
      CSS Masonry Layout
    </h1>
    <p class="text-app-text/60 text-base">
      A pure Tailwind implementation using CSS columns.
    </p>
  </div>

  <div class="columns-1 sm:columns-2 md:columns-3 xl:columns-4 gap-4 space-y-4">
    @for (image of images(); track image.id) {
    <div
      class="break-inside-avoid relative group rounded-2xl overflow-hidden shadow-sm border border-app-border/40 bg-app-card">
      <img
        [src]="image.url"
        [alt]="image.alt"
        class="w-full h-auto block object-cover transform group-hover:scale-[1.02] transition-transform duration-300 ease-out"
        loading="lazy" />
      <div
        class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors duration-300 pointer-events-none"></div>
    </div>
    }
  </div>
</div>

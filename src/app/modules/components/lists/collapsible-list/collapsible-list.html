<div class="h-full bg-app-card border border-app-border rounded-2xl p-6 relative overflow-hidden flex flex-col justify-between">
  <div class="relative z-10 flex-grow">
    <div class="mb-5 pb-3 border-b border-app-border/40">
      <h3 class="text-base font-bold text-app-text tracking-tight">Expandable Q&A</h3>
      <p class="text-[10px] text-app-text/40 font-bold uppercase tracking-wider mt-0.5">Accordion List</p>
    </div>

    <div class="flex flex-col gap-3">
      @for (item of items; track item.id) {
        <div class="rounded-xl border border-app-border overflow-hidden transition-all duration-300">
          <button 
            (click)="toggleItem(item.id)"
            class="w-full flex items-center justify-between p-4 bg-app-text/1 hover:bg-app-text/3 text-left font-bold text-xs text-app-text transition-all duration-200 cursor-pointer focus:outline-none"
            [attr.aria-expanded]="openItemId() === item.id"
            [attr.aria-label]="(openItemId() === item.id ? 'Collapse: ' : 'Expand: ') + item.title">
            <div class="flex items-center gap-3">
              <span class="material-icons text-lg text-app-accent">
                {{ item.icon }}
              </span>
              <span class="tracking-tight">{{ item.title }}</span>
            </div>
            <span class="material-icons text-base text-app-text/40 transition-transform duration-300" [class.rotate-180]="openItemId() === item.id">
              expand_more
            </span>
          </button>
          
          <div 
            class="grid transition-all duration-300 ease-in-out"
            [class.grid-rows-[1fr]]="openItemId() === item.id"
            [class.grid-rows-[0fr]]="openItemId() !== item.id">
            <div class="overflow-hidden">
              <div class="p-4 pt-1 text-[11px] leading-relaxed text-app-text/75 border-t border-app-border/40 bg-app-card">
                {{ item.content }}
              </div>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</div>

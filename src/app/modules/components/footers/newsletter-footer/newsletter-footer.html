<footer
  class="w-full bg-app-card border-t border-app-border rounded-2xl p-6 md:p-8 flex flex-col md:flex-row justify-between items-center gap-6">
  <div class="flex flex-col items-center md:items-start gap-2">
    <div class="flex items-center gap-2">
      <span class="material-icons text-app-accent text-xl">token</span>
      <span class="font-extrabold tracking-tight text-app-text font-sans"
        >Wanderlee UI</span
      >
    </div>
    <p class="text-xs text-app-text/50">
      © {{ year }} Wanderlee. All rights reserved.
    </p>
  </div>

  <div class="w-full max-w-sm">
    @if (isSubscribed()) {
    <p
      class="text-xs text-emerald-500 font-bold text-center md:text-right flex items-center justify-center md:justify-end gap-1.5 h-11">
      <span class="material-icons text-sm">check_circle</span>
      Thanks for subscribing!
    </p>
    } @else {
    <form (submit)="$event.preventDefault(); subscribe()" class="flex gap-2">
      <input
        type="email"
        [value]="email()"
        (input)="email.set($any($event.target).value)"
        placeholder="Newsletter"
        class="flex-grow px-3.5 h-11 rounded-xl bg-app-text/3 border border-app-border text-app-text placeholder-app-text/30 text-xs focus:outline-none focus:ring-2 focus:ring-app-accent/40 focus:border-app-accent transition-all"
        required />
      <button
        type="submit"
        class="px-4 h-11 rounded-xl bg-app-accent text-white font-bold text-[10px] uppercase tracking-wider hover:bg-app-accent/90 transition-all cursor-pointer">
        Subscribe
      </button>
    </form>
    }
  </div>
</footer>

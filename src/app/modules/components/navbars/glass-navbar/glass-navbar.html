<nav class="glass-navbar">
  <div class="glass-container">
    <!-- Logo -->
    <div class="glass-brand">
      <div class="brand-glow"></div>
      <span class="material-icons brand-icon">hexagon</span>
      <span class="brand-text">{{ logoText() }}</span>
    </div>

    <!-- Desktop Links -->
    <div class="glass-links">
      @for (link of links(); track link) {
        <a href="javascript:void(0)" class="glass-link">{{ link }}</a>
      }
    </div>

    <!-- Actions -->
    <div class="glass-actions">
      <button type="button" class="glass-btn-outline">Log in</button>
      <button type="button" class="glass-btn-solid">Start Free</button>

      <!-- Mobile Toggle -->
      <button (click)="toggleMobileMenu()" type="button" class="glass-hamburger" aria-label="Toggle menu">
        <span class="material-icons">{{ isMobileMenuOpen() ? 'close' : 'menu' }}</span>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  @if (isMobileMenuOpen()) {
    <div class="glass-mobile animate-glass-in">
      @for (link of links(); track link) {
        <a href="javascript:void(0)" (click)="isMobileMenuOpen.set(false)" class="glass-mobile-link">{{ link }}</a>
      }
      <div class="glass-mobile-actions">
        <button type="button" class="glass-btn-outline mobile">Log in</button>
        <button type="button" class="glass-btn-solid mobile">Start Free</button>
      </div>
    </div>
  }
</nav>

<div class="banner-nav-wrapper">
  <!-- Promo Announcement Banner -->
  @if (isBannerVisible()) {
  <div class="promo-banner">
    <div class="banner-text-container">
      <span class="banner-tag">NEW</span>
      <span class="banner-msg">Aether Pro templates are now live! Use code <strong>AETHER10</strong> for 10% off.</span>
    </div>
    <button type="button" class="close-banner-btn" (click)="closeBanner()" aria-label="Close banner">
      <span class="material-icons">close</span>
    </button>
  </div>
  }

  <!-- Main Navigation -->
  <nav class="main-navbar">
    <div class="navbar-container">
      <div class="brand">
        <span class="material-icons brand-icon">rocket_launch</span>
        <span class="brand-text">Astra</span>
      </div>

      <div class="nav-links">
        <a href="javascript:void(0)" class="nav-link active">Home</a>
        <a href="javascript:void(0)" class="nav-link">Marketplace</a>
        <a href="javascript:void(0)" class="nav-link">Features</a>
        <a href="javascript:void(0)" class="nav-link">Contact</a>
      </div>

      <div class="nav-actions">
        <button type="button" class="btn-primary">Get Astra</button>
      </div>

      <button type="button" class="mobile-toggle" (click)="toggleMobile()" aria-label="Toggle menu">
        <span class="material-icons">{{ isMobileOpen() ? 'close' : 'menu' }}</span>
      </button>
    </div>

    @if (isMobileOpen()) {
    <div class="mobile-menu">
      <a href="javascript:void(0)" class="mobile-link active">Home</a>
      <a href="javascript:void(0)" class="mobile-link">Marketplace</a>
      <a href="javascript:void(0)" class="mobile-link">Features</a>
      <a href="javascript:void(0)" class="mobile-link">Contact</a>
      <div class="mobile-actions">
        <button type="button" class="btn-primary w-full">Get Astra</button>
      </div>
    </div>
    }
  </nav>
</div>

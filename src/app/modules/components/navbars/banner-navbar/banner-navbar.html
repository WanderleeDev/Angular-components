<div class="w-full bg-app-card border border-app-border rounded-xl shadow-[0_4px_20px_-2px_rgba(0,0,0,0.15)] font-sans overflow-hidden">
  <!-- Promo Banner -->
  @if (isBannerVisible()) {
  <div class="bg-gradient-to-br from-indigo-600 to-blue-600 text-app-text px-4 py-2 flex items-center justify-between gap-4 relative transition-all duration-300 ease-out starting:opacity-0 starting:-translate-y-2">
    <div class="flex items-center gap-2.5 text-[0.775rem] flex-1">
      <span class="bg-white text-indigo-600 font-extrabold text-[0.65rem] px-1.5 py-0.5 rounded-[4px] tracking-[0.05em]">NEW</span>
      <span class="font-medium leading-relaxed opacity-95">Aether Pro templates are now live! Use code <strong>AETHER10</strong> for 10% off.</span>
    </div>
    <button
      type="button"
      class="flex items-center justify-center bg-transparent border-none text-app-text opacity-70 hover:opacity-100 hover:bg-app-text/10 cursor-pointer p-1 rounded-[4px] transition-all"
      (click)="closeBanner()"
      aria-label="Close banner">
      <span class="material-icons text-base">close</span>
    </button>
  </div>
  }

  <!-- Main Navigation -->
  <nav class="relative">
    <div class="flex items-center justify-between px-5 py-3">

      <div class="flex items-center gap-2 cursor-pointer">
        <span class="material-icons text-blue-500 text-2xl">rocket_launch</span>
        <span class="font-extrabold text-[1.15rem] tracking-[-0.025em] text-app-text">Astra</span>
      </div>


      <div class="hidden md:flex items-center gap-2">
        @for (link of navLinks; track link) {
        <a href="#" (click)="$event.preventDefault(); activeLink.set(link)"
           class="no-underline text-[0.825rem] px-[0.85rem] py-[0.45rem] rounded-lg transition-all duration-200"
           [class]="activeLink() === link ? 'font-[650] text-blue-500 bg-blue-500/10' : 'font-[550] text-app-text/65 hover:text-app-text hover:bg-app-text/[0.04]'">
          {{ link }}
        </a>
        }
      </div>


      <div class="hidden md:flex items-center">
        <button type="button" class="bg-blue-600 border-none text-app-text text-[0.8rem] font-bold px-[1.15rem] py-2 rounded-lg cursor-pointer shadow-[0_4px_12px_0_rgba(37,99,235,0.15)] hover:bg-blue-500 hover:-translate-y-px hover:shadow-[0_6px_15px_0_rgba(37,99,235,0.15)] transition-all duration-200">Get Astra</button>
      </div>


      <button
        type="button"
        class="flex md:hidden items-center justify-center bg-transparent border-none text-app-text/80 hover:bg-app-text/5 hover:opacity-100 cursor-pointer p-1 rounded-lg transition-all"
        (click)="toggleMobile()"
        aria-label="Toggle menu">
        <span class="material-icons">{{ isMobileOpen() ? 'close' : 'menu' }}</span>
      </button>
    </div>

    <!-- Mobile Drawer -->
    @if (isMobileOpen()) {
    <div class="bg-app-text/[0.01] border-t border-white/5 p-3 flex flex-col gap-1 transition-all duration-200 ease-out starting:opacity-0 starting:-translate-y-[5px]">
      @for (link of navLinks; track link) {
      <a href="#" (click)="$event.preventDefault(); activeLink.set(link)"
         class="no-underline text-[0.85rem] px-[0.75rem] py-[0.55rem] rounded-lg transition-all"
         [class]="activeLink() === link ? 'font-[550] text-blue-500 bg-blue-500/10' : 'font-[550] text-app-text/70 hover:text-app-text hover:bg-app-text/[0.04]'">
        {{ link }}
      </a>
      }
      

      <div class="mt-2 pt-2 border-t border-white/5 flex flex-col gap-2">
        <button type="button" class="w-full bg-blue-600 border-none text-app-text text-[0.8rem] font-bold px-[1.15rem] py-2 rounded-lg cursor-pointer shadow-[0_4px_12px_0_rgba(37,99,235,0.15)] hover:bg-blue-500 hover:-translate-y-px hover:shadow-[0_6px_15px_0_rgba(37,99,235,0.15)] transition-all duration-200">Get Astra</button>
      </div>
    </div>
    }
  </nav>
</div>

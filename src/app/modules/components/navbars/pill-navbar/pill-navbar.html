<nav class="pill-navbar">
  <div class="pill-container">
    <div class="pill-brand">
      <span class="material-icons brand-icon">rocket_launch</span>
      <span class="brand-text">{{ logoText() }}</span>
    </div>

    <div class="pill-links-wrapper">
      @for (link of links(); track link) {
      <button
        type="button"
        class="pill-link"
        [class.active]="activeLink() === link"
        (click)="selectLink(link)">
        {{ link }}
      </button>
      }
    </div>

    <div class="pill-actions">
      <button type="button" class="pill-cta">
        <span class="material-icons cta-icon">arrow_forward</span>
        Get Started
      </button>

      <button
        (click)="toggleMobileMenu()"
        type="button"
        class="pill-hamburger"
        aria-label="Toggle menu">
        <span class="material-icons"
          >{{ isMobileMenuOpen() ? 'close' : 'segment' }}</span
        >
      </button>
    </div>
  </div>

  @if (isMobileMenuOpen()) {
  <div class="pill-mobile animate-pill-in">
    @for (link of links(); track link) {
    <button
      type="button"
      class="pill-mobile-link"
      [class.active]="activeLink() === link"
      (click)="selectLink(link); isMobileMenuOpen.set(false)">
      {{ link }}
    </button>
    }
    <button type="button" class="pill-cta mobile">
      <span class="material-icons cta-icon">arrow_forward</span>
      Get Started
    </button>
  </div>
  }
</nav>

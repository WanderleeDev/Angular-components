<nav class="search-nav">
  <div class="nav-container">
    <div class="brand-section">
      <button
        type="button"
        class="mobile-menu-btn"
        (click)="toggleMobile()"
        aria-label="Toggle menu">
        <span class="material-icons">menu</span>
      </button>
      <div class="nav-logo">
        <span class="material-icons">local_mall</span>
        <span class="logo-text">NovaShop</span>
      </div>
    </div>

    <div class="search-section">
      <div class="search-input-wrapper">
        <span class="material-icons search-icon">search</span>
        <input
          type="text"
          placeholder="Search products, brands..."
          class="search-input" />
        <span class="shortcut-badge">⌘K</span>
      </div>
    </div>

    <div class="actions-section">
      <button
        type="button"
        class="icon-btn search-mobile-trigger"
        aria-label="Search">
        <span class="material-icons">search</span>
      </button>
      <button type="button" class="icon-btn" aria-label="Wishlist">
        <span class="material-icons">favorite_border</span>
      </button>
      <button
        type="button"
        class="icon-btn cart-btn"
        aria-label="Shopping Cart">
        <span class="material-icons">shopping_bag</span>
        <span class="cart-badge">3</span>
      </button>
      <div class="user-profile">
        <img
          src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=80&auto=format&fit=crop&q=60"
          alt="Profile"
          class="avatar" />
      </div>
    </div>
  </div>

  @if (isMobileMenuOpen()) {
  <div class="mobile-drawer">
    <div class="mobile-search-bar">
      <div class="search-input-wrapper">
        <span class="material-icons search-icon">search</span>
        <input
          type="text"
          placeholder="Search products..."
          class="search-input" />
      </div>
    </div>
    <div class="mobile-nav-links">
      <a href="javascript:void(0)" class="mobile-nav-link">New Arrivals</a>
      <a href="javascript:void(0)" class="mobile-nav-link">Trending</a>
      <a href="javascript:void(0)" class="mobile-nav-link">Clothing</a>
      <a href="javascript:void(0)" class="mobile-nav-link">Accessories</a>
      <a href="javascript:void(0)" class="mobile-nav-link">Sales</a>
    </div>
  </div>
  }
</nav>

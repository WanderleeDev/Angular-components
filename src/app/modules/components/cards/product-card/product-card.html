<div
  class="h-full bg-app-card border border-app-border rounded-2xl p-6 relative overflow-hidden transition-all duration-300 hover:shadow-xl hover:border-app-accent/20 flex flex-col justify-between">
  <div
    class="absolute -top-24 -left-24 w-48 h-48 rounded-full blur-3xl opacity-20 transition-all duration-500"
    [style.backgroundColor]="selectedColor().value"></div>
  <div
    class="absolute -bottom-24 -right-24 w-48 h-48 rounded-full blur-3xl opacity-10 transition-all duration-500"
    [style.backgroundColor]="selectedColor().value"></div>

  <div class="relative z-10">
    <div class="flex justify-between items-start mb-4">
      <div>
        <span
          class="text-xs font-bold uppercase tracking-wider text-app-text/40"
          >{{ category }}</span
        >
        <h3 class="text-xl font-bold text-app-text tracking-tight mt-1">
          {{ name }}
        </h3>
      </div>
      <span
        class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-bold bg-app-text/5 text-app-text/80">
        <span class="material-icons text-[14px] text-amber-400">star</span>
        4.8
      </span>
    </div>

    <div
      class="relative h-44 rounded-xl bg-app-text/3 border border-app-border overflow-hidden flex items-center justify-center mb-6 group-hover:scale-[1.02] transition-transform duration-300">
      <div
        class="absolute w-32 h-32 rounded-full border border-dashed border-app-text/10 animate-spin"
        style="animation-duration: 20s"></div>
      <div
        class="absolute w-24 h-24 rounded-full border border-app-text/10"></div>
      <div
        class="absolute w-20 h-20 rounded-full bg-linear-to-tr transition-all duration-500 ease-in-out scale-110 shadow-lg"
        [class]="selectedColor().gradient"
        [style.boxShadow]="'0 8px 24px ' + selectedColor().value + '40'"></div>
      <svg
        class="w-24 h-24 relative z-10 drop-shadow-xl text-white transform -rotate-12 transition-transform duration-500 hover:rotate-0"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
        xmlns="http://www.w3.org/2000/svg">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="1.5"
          d="M21 12.75V12a9 9 0 00-9-9h-.75M21 12.75a9 9 0 01-9 9M21 12.75H12a9 9 0 01-9-9V3m9 9v9.75M3 12h9.75"></path>
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="1.5"
          d="M4 17.5c0 0 2-4 5-4.5s8 .5 10 2c1.5 1.1 2 2.5 2 2.5H4v-0.5z"
          fill="rgba(255,255,255,0.1)"></path>
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="1.5"
          d="M19 15c-1-2.5-3-5.5-6-6.5S6.5 9 5 11l-1 2.5"
          fill="none"></path>
      </svg>

      @if (quantity() > 0) {
      <span
        class="absolute top-3 left-3 bg-app-accent text-white text-[10px] font-extrabold px-2 py-0.5 rounded-full shadow-xs">
        IN CART: {{ quantity() }}
      </span>
      }
    </div>

    <div class="mb-5">
      <label
        class="block text-xs font-bold text-app-text/50 uppercase tracking-wider mb-2"
        >Color: {{ selectedColor().name }}</label
      >
      <div class="flex gap-3">
        @for (color of colors; track color.name) {
        <button
          (click)="selectColor(color)"
          [style.backgroundColor]="color.value"
          class="w-6 h-6 rounded-full transition-all duration-300 relative border border-transparent focus:outline-none cursor-pointer"
          [class.ring-2]="selectedColor().name === color.name"
          [class.ring-offset-2]="selectedColor().name === color.name"
          [class.ring-offset-app-card]="selectedColor().name === color.name"
          [style.ringColor]="color.value"
          [attr.aria-label]="'Select ' + color.name + ' color'">
          @if (selectedColor().name === color.name) {
          <span
            class="absolute inset-0 flex items-center justify-center text-[10px] text-white">
            ✓
          </span>
          }
        </button>
        }
      </div>
    </div>

    <div class="mb-6">
      <label
        class="block text-xs font-bold text-app-text/50 uppercase tracking-wider mb-2"
        >Size (US)</label
      >
      <div class="flex gap-2">
        @for (size of sizes; track size) {
        <button
          (click)="selectSize(size)"
          class="flex-1 py-1.5 rounded-lg border text-xs font-bold transition-all duration-200 cursor-pointer focus:outline-none"
          [class.bg-app-text]="selectedSize() === size"
          [class.text-app-card]="selectedSize() === size"
          [class.border-app-text]="selectedSize() === size"
          [class.bg-transparent]="selectedSize() !== size"
          [class.text-app-text/70]="selectedSize() !== size"
          [class.border-app-border]="selectedSize() !== size"
          [class.hover:border-app-text/30]="selectedSize() !== size"
          [attr.aria-label]="'Select size ' + size">
          {{ size }}
        </button>
        }
      </div>
    </div>
  </div>

  <div
    class="relative z-10 border-t border-app-border/40 pt-4 flex items-center justify-between gap-4">
    <div>
      <span
        class="text-xs text-app-text/40 block leading-none font-bold uppercase tracking-wider"
        >Price</span
      >
      <span class="text-2xl font-black text-app-text mt-1 font-mono"
        >${{ priceDisplay() }}</span
      >
    </div>

    <button
      (click)="addToCart()"
      class="w-[145px] h-11 px-4 rounded-xl font-bold text-xs uppercase tracking-wider transition-all duration-300 flex items-center justify-center gap-2 cursor-pointer shadow-xs focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2"
      [class.bg-linear-to-r]="!isAdded() && !isAdding()"
      [class]="!isAdded() && !isAdding() ? selectedColor().gradient + ' text-white hover:shadow-lg' : ''"
      [class.bg-amber-500]="isAdding()"
      [class.text-white]="isAdding()"
      [class.bg-emerald-500]="isAdded()"
      [class.text-white]="isAdded()"
      [disabled]="isAdding()"
      [attr.aria-label]="isAdding() ? 'Adding product to cart' : isAdded() ? 'Added to cart successfully' : 'Add ' + name + ' to cart'">
      @if (isAdding()) {
      <span
        class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
      Adding... } @else if (isAdded()) {
      <span class="material-icons text-sm">check_circle</span>
      Added! } @else {
      <span class="material-icons text-sm">shopping_cart</span>
      Add to Cart }
    </button>
  </div>
</div>

<div
  class="stat-card"
  [class.negative-trend]="!positive() && trend() !== 'Stable'">
  <div class="card-glow"></div>

  <div class="stat-card-header">
    <span class="stat-title">{{ title() }}</span>
    <span class="material-icons stat-icon">{{ icon() }}</span>
  </div>

  <div class="stat-card-body">
    <div class="stat-value">{{ value() }}</div>

    <div class="trend-wrapper">
      <span
        class="trend-badge"
        [class.trend-up]="positive()"
        [class.trend-down]="!positive() && trend() !== 'Stable'">
        {{ trend() }}
      </span>
    </div>
  </div>

  <!-- Mini Sparkline SVG -->
  <div class="sparkline-wrapper">
    <svg viewBox="0 0 120 30" class="sparkline-svg" preserveAspectRatio="none">
      <!-- Sparkline fill area -->
      <path
        [attr.d]="'M 0,30 L ' + polylinePoints() + ' L 120,30 Z'"
        class="sparkline-fill" />
      <!-- Sparkline outline path -->
      <polyline
        fill="none"
        [attr.points]="polylinePoints()"
        stroke-width="1.5"
        class="sparkline-stroke" />
    </svg>
  </div>
</div>

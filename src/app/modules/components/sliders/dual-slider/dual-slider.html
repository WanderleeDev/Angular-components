<div class="dual-slider-wrapper">
  <div class="dual-slider-info">
    <span class="dual-slider-label">{{ label() }}</span>
    <span class="dual-slider-value-display"
      >${{ lowerValue() }} - ${{ upperValue() }}</span
    >
  </div>

  <div class="dual-slider-control-container">
    <div class="slider-track-base"></div>
    <div
      class="slider-track-range"
      [style.left.%]="lowerPercent()"
      [style.right.%]="100 - upperPercent()"></div>

    <input
      type="range"
      [min]="min()"
      [max]="max()"
      [value]="lowerValue()"
      (input)="onLowerChange($event)"
      class="thumb-input lower-thumb" />

    <input
      type="range"
      [min]="min()"
      [max]="max()"
      [value]="upperValue()"
      (input)="onUpperChange($event)"
      class="thumb-input upper-thumb" />
  </div>

  <div class="dual-slider-bounds">
    <span>${{ min() }}</span>
    <span>${{ max() }}</span>
  </div>
</div>

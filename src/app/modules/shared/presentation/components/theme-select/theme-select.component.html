@if (theme.isHydrated()) {
  <div class="relative inline-block w-[136px]">
    <select
      (change)="onThemeSelect($event)"
      class="appearance-none w-full px-3.5 py-2 pr-8 bg-app-card/75 backdrop-blur-md border border-app-border/40 rounded-xl text-sm font-medium text-app-text/90 hover:bg-app-accent/10 hover:border-app-accent/30 hover:text-app-text focus:outline-none focus:ring-2 focus:ring-app-accent/50 cursor-pointer transition-all duration-200 shadow-sm h-[40px]">
      @for (t of theme.availableThemes; track t) {
        <option 
          [value]="t" 
          [selected]="theme.selectedTheme() === t"
          class="bg-app-card text-app-text capitalize">
          {{ t }}
        </option>
      }
    </select>
    <div
      class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-app-text/60">
      <svg
        class="w-4 h-4 opacity-60"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2.5"
          d="M19 9l-7 7-7-7" />
      </svg>
    </div>
  </div>
} @else {
  <div
    class="h-[40px] w-[136px] rounded-xl bg-slate-800 animate-pulse border border-slate-700/50"></div>
}

<section class="max-w-7xl mx-auto px-4 py-8">
  <div class="mb-6">
    <a routerLink="/catalog" class="inline-flex items-center gap-2 no-underline text-app-text/60 hover:text-app-accent text-xs font-bold uppercase tracking-wider transition-all hover:-translate-x-1 focus:outline-none focus-visible:ring-2 focus-visible:ring-app-accent/50 rounded-lg p-1">
      <span class="material-icons text-sm">arrow_back</span>
      <span>Back to Catalog</span>
    </a>
  </div>
  <h2 class="text-2xl md:text-3xl lg:text-4xl font-extrabold mb-8 text-app-text flex items-center gap-3 capitalize tracking-tight font-krona">
    {{ id() ?? 'empty' }}
    <span class="text-xs font-bold text-app-accent bg-app-accent/10 border border-app-accent/20 px-3 py-1 rounded-full">15</span>
  </h2>
  <div class="grid w-full gap-6 grid-cols-1 min-[350px]:[grid-template-columns:repeat(auto-fill,minmax(min(100%,330px),1fr))]">
    <app-window nameComponent="interactive star rating">
      <app-star-rating [rating]="3" />
    </app-window>
    <app-window nameComponent="readonly rating display">
      <app-star-rating [rating]="4" [isReadonly]="true" />
    </app-window>
    <app-window nameComponent="10 star rating scale">
      <app-star-rating [rating]="7" [numberStars]="10" />
    </app-window>
    <app-window nameComponent="vertical layout">
      <app-star-rating [rating]="2" orientation="vertical" />
    </app-window>
    <app-window nameComponent="custom accent rating">
      <app-star-rating [rating]="4" backgroundColor="var(--accent)" />
    </app-window>
    <app-window nameComponent="empty/placeholder state">
      <app-star-rating [rating]="0" [isReadonly]="true" />
    </app-window>
  </div>
</section>

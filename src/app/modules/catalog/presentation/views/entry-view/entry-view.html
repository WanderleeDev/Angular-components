<div class="flex flex-col gap-8 max-w-7xl mx-auto w-full">
  <app-catalog-header
    [searchQuery]="searchQuery()"
    (searchChange)="onSearch($event)" />

  <section class="w-full">
    <div
      class="grid w-full gap-6 grid-cols-1 min-[350px]:grid-cols-[repeat(auto-fill,minmax(min(100%,330px),1fr))]">
      @if (showThemesCard()) {
      <app-animated-card
        class="starting:opacity-0 transition-all duration-300 ease-out starting:translate-y-10"
        [cardData]="themeCardData" />
      } @for (item of filteredComponents(); track item.title) {
      <app-animated-card
        class="starting:opacity-0 transition-all duration-300 ease-out starting:translate-y-10"
        [cardData]="item" />
      } @if (!showThemesCard() && filteredComponents().length === 0) {
      <div
        class="col-span-full flex flex-col items-center justify-center py-16 px-10 bg-app-card border border-dashed border-app-border rounded-2xl text-center my-5 shadow-sm">
        <span class="material-icons text-app-text/30 mb-4 text-5xl"
          >sentiment_dissatisfied</span
        >
        <h3 class="text-lg font-bold text-app-text mb-2 font-krona">
          No components found
        </h3>
        <p class="text-sm text-app-text/60 mb-5">
          We couldn't find any components matching "{{ searchQuery() }}"
        </p>
        <button
          class="bg-transparent border border-app-accent/30 text-app-accent px-5 py-2 rounded-xl font-semibold hover:bg-app-accent/8 hover:border-app-accent transition-all cursor-pointer focus:outline-none focus-visible:ring-2 focus-visible:ring-app-accent/50"
          (click)="searchQuery.set('')">
          Clear Search
        </button>
      </div>
      }
    </div>
  </section>

  <app-catalog-cta />
</div>

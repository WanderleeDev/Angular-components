<div class="relative mb-6">
  <div class="relative rounded-2xl overflow-hidden h-48 sm:h-60 flex flex-col justify-center px-6 sm:px-10 bg-app-card border border-app-border/40 shadow-lg">
    <div class="absolute inset-0 z-10 bg-[radial-gradient(circle_at_80%_20%,rgba(56,189,248,0.12),transparent_60%),radial-gradient(circle_at_20%_80%,rgba(226,28,52,0.12),transparent_60%)]"></div>
    <div class="relative z-20 max-w-[700px]">
      <h1 class="text-3xl md:text-4xl lg:text-5xl font-extrabold mb-3 tracking-tight font-krona bg-gradient-to-r from-app-text to-app-text/80 bg-clip-text text-transparent">Component Catalog</h1>
      <p class="text-sm md:text-base leading-relaxed text-app-text/60">
        Explore our comprehensive library of production-ready Angular
        components, engineered for enterprise performance and speed.
      </p>
    </div>
  </div>

  <div class="relative max-w-xl -mt-7 mx-auto px-4 z-20 w-full box-border">
    <div class="flex items-center bg-app-card/90 backdrop-blur-md border border-app-accent/25 rounded-full px-4 sm:px-6 py-3 sm:py-3.5 shadow-xl transition-all duration-300 focus-within:border-app-accent focus-within:shadow-[0_10px_30px_-5px_rgba(0,0,0,0.6),0_0_25px_rgba(56,189,248,0.2)] focus-within:-translate-y-0.5">
      <span class="material-icons text-app-text/40 mr-3 shrink-0 text-xl">search</span>
      <input
        type="text"
        class="flex-1 bg-transparent border-none outline-none text-sm text-app-text placeholder-app-text/40 search-input"
        placeholder="Search components (e.g. 'Cards', 'Sliders')..."
        [value]="searchQuery()"
        (input)="onSearch($event)" />
      <span class="text-[0.7rem] font-bold text-app-text/40 bg-app-text/5 border border-app-border rounded-md px-2 py-1 select-none hidden md:block">Ctrl + K</span>
    </div>
  </div>
</div>

<article
  class="group bg-app-card border border-app-border rounded-xl overflow-hidden shadow-md transition-all duration-300 hover:-translate-y-1 hover:shadow-lg hover:border-app-accent hover:ring-1 hover:ring-app-accent">
  <header
    class="flex items-center justify-between px-4 py-3 bg-[color-mix(in_srgb,var(--accent)_3%,var(--card-bg))] border-b border-app-border gap-3">
    <h3
      class="m-0 flex-1 text-[0.85rem] font-semibold text-app-text capitalize tracking-wide font-sans opacity-85">
      {{ nameComponent() || 'Empty name' }}
    </h3>
    <div class="flex items-center gap-3">
      <app-btn-base
        #btnTailwind
        [style.display]="tailwindPath() ? 'inline-block' : 'none'"
        (click)="toggleTailwindModal()"
        class="text-app-text/60 hover:text-[#38bdf8] transition-all duration-200"
        label="View Tailwind version">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="1em"
          height="1em"
          viewBox="0 0 128 128">
          <path d="M0 0h128v128H0z" fill="none" />
          <path
            fill="#38bdf8"
            d="M64.004 25.602c-17.067 0-27.73 8.53-32 25.597c6.398-8.531 13.867-11.73 22.398-9.597c4.871 1.214 8.352 4.746 12.207 8.66C72.883 56.629 80.145 64 96.004 64c17.066 0 27.73-8.531 32-25.602q-9.6 12.803-22.399 9.602c-4.87-1.215-8.347-4.746-12.207-8.66c-6.27-6.367-13.53-13.738-29.394-13.738M32.004 64c-17.066 0-27.73 8.531-32 25.602Q9.603 76.799 22.402 80c4.871 1.215 8.352 4.746 12.207 8.66c6.274 6.367 13.536 13.738 29.395 13.738c17.066 0 27.73-8.53 32-25.597q-9.6 12.797-22.399 9.597c-4.87-1.214-8.347-4.746-12.207-8.66C55.128 71.371 47.868 64 32.004 64m0 0" />
        </svg>
      </app-btn-base>

      <app-btn-base
        #btnCss
        [style.display]="cssPath() ? 'inline-block' : 'none'"
        (click)="toggleCssModal()"
        class="text-app-text/60 transition-all duration-200"
        label="View CSS version">
        <svg
          class="w-5 h-5"
          viewBox="0 0 128 128"
          fill="none"
          xmlns="http://www.w3.org/2000/svg">
          <path d="M0 0h128v128H0z" fill="#a855f7" />
          <path
            fill="#a855f7"
            d="M0 0h107.52C118.831 0 128 9.168 128 20.48v87.04c0 11.312-9.168 20.48-20.48 20.48H20.48C9.169 128 0 118.832 0 107.52Z" />
          <path
            fill="#fff"
            d="M45.836 117.762c-8.219-.008-13.293-4.64-13.195-13.16V83.05q0-6.481 3.793-9.852c4.543-4.379 15.082-4.644 19.53.067c2.743 2.417 3.778 7.355 3.532 11.964H50.06c.074-1.808-.024-4.554-1.09-5.586c-1.383-1.87-5.035-1.652-6.004.297c-.594 1.059-.89 2.621-.89 4.696v18.71q0 5.884 4.09 5.95q1.914-.001 2.905-1.39c.918-1.099 1.063-3.528.989-5.29h9.437c.645 8.969-4.652 15.254-13.66 15.144Zm29.957 0c-9.11.125-13.184-6.36-12.934-15.145h8.91c-.25 3.832 1.067 7.32 4.223 7.078q2.11 0 2.969-1.324c1.086-1.613 1.293-6.265-.266-8.066c-1.085-1.735-4.996-3.266-7.058-4.297q-4.423-2.115-6.367-5.027c-2.93-4.305-2.657-13.754 1.449-17.586c3.992-4.727 14.414-4.942 18.41-.098c2.465 2.496 3.54 7.41 3.332 11.934h-8.578c.074-1.86-.102-4.86-.824-5.95q-.762-1.39-2.871-1.39q-3.762.001-3.762 4.496c.027 3.18 1.27 4.488 4.16 5.816c3.742 1.453 8.5 3.938 10.227 6.942c5.144 9.16 1.613 23.148-11.02 22.613Zm28.77 0c-9.11.125-13.184-6.36-12.934-15.145h8.91c-.25 3.832 1.066 7.32 4.223 7.078q2.108 0 2.969-1.324c1.085-1.613 1.289-6.265-.266-8.066c-1.086-1.735-4.996-3.266-7.059-4.297q-4.423-2.115-6.367-5.027c-2.93-4.305-2.656-13.754 1.45-17.586c3.992-4.727 14.413-4.942 18.41-.098c2.464 2.496 3.539 7.41 3.332 11.934h-8.579c.07-1.86-.101-4.86-.824-5.95q-.762-1.39-2.87-1.39q-3.763.001-3.763 4.496c.028 3.18 1.27 4.488 4.16 5.816c3.743 1.453 8.5 3.938 10.227 6.942c5.145 9.16 1.614 23.148-11.02 22.613Z" />
        </svg>
      </app-btn-base>
    </div>
  </header>
  <div
    class="px-6 py-7 min-h-[200px] flex flex-col items-center justify-center bg-[radial-gradient(var(--border)_1.2px,transparent_1.2px)] [background-size:16px_16px] bg-center transition-colors duration-300">
    <ng-content />
  </div>
</article>

@if (tailwindPath()) { @defer (on hover(btnTailwind)) { @if
(isTailwindModalOpen()) {
<app-modal-code
  [(isViewModal)]="isTailwindModalOpen"
  [localPath]="tailwindPath() ?? null"
  [localFiles]="tailwindFiles() ?? null" />
} } } @if (cssPath()) { @defer (on hover(btnCss)) { @if (isCssModalOpen()) {
<app-modal-code
  [(isViewModal)]="isCssModalOpen"
  [localPath]="cssPath() ?? null"
  [localFiles]="cssFiles() ?? null" />
} } }

<article
  class="group bg-app-card border border-app-border rounded-xl overflow-hidden shadow-md transition-all duration-300 hover:-translate-y-1 hover:shadow-lg hover:border-app-accent hover:ring-1 hover:ring-app-accent">
  <header
    class="flex items-center justify-between px-4 py-3 bg-[color-mix(in_srgb,var(--accent)_3%,var(--card-bg))] border-b border-app-border gap-3">
    <h3
      class="m-0 flex-1 text-[0.85rem] font-semibold text-app-text capitalize tracking-wide font-sans opacity-85">
      {{ nameComponent() || 'Empty name' }}
    </h3>
    <div class="flex items-center gap-3">
      <ng-content select="header-options" />
    </div>
  </header>
  <div
    class="px-6 py-7 min-h-50 flex flex-col items-center justify-center bg-[radial-gradient(var(--border)_1.2px,transparent_1.2px)] bg-size-[16px_16px] bg-center transition-colors duration-300">
    <ng-content />
  </div>
</article>

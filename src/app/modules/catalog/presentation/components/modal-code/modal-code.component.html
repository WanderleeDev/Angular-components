<div
  class="starting:opacity-0 starting:translate-y-10 border-2 border-app-accent/50 transition-discrete duration-500 w-[95vw] h-[95vh] max-w-[1200px] max-h-[500px] rounded-2xl bg-app-card/80 backdrop-blur-xl overflow-hidden shadow-2xl flex flex-col animate-in fade-in zoom-in-95 mx-auto">
  <header
    class="flex items-center justify-between px-6 py-4 border-b border-app-border bg-app-card/50">
    <div class="flex items-center gap-3">
      <div
        class="flex space-x-1 p-1 rounded-xl bg-black/20 border border-app-border shadow-inner">
        <button
          (click)="activeTab.set('ts')"
          [class.bg-app-accent]="activeTab() === 'ts'"
          [class.text-white]="activeTab() === 'ts'"
          [class.shadow-md]="activeTab() === 'ts'"
          class="px-4 py-1.5 text-sm font-medium rounded-lg text-app-text/70 hover:text-app-text transition-all duration-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-app-accent/50">
          TypeScript
        </button>
        <button
          (click)="activeTab.set('html')"
          [class.bg-app-accent]="activeTab() === 'html'"
          [class.text-white]="activeTab() === 'html'"
          [class.shadow-md]="activeTab() === 'html'"
          class="px-4 py-1.5 text-sm font-medium rounded-lg text-app-text/70 hover:text-app-text transition-all duration-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-app-accent/50">
          HTML
        </button>
        @if (path.css) {
          <button
            (click)="activeTab.set('css')"
            [class.bg-app-accent]="activeTab() === 'css'"
            [class.text-white]="activeTab() === 'css'"
            [class.shadow-md]="activeTab() === 'css'"
            class="px-4 py-1.5 text-sm font-medium rounded-lg text-app-text/70 hover:text-app-text transition-all duration-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-app-accent/50">
            CSS
          </button>
        }
      </div>
    </div>

    <div
      class="flex items-center gap-2 opacity-80 hover:opacity-100 transition-opacity">
      <app-btn-base label="Close" (click)="close()">
        <span class="material-icons text-lg">close</span>
        <span class="sr-only">Close modal</span>
      </app-btn-base>
    </div>
  </header>

  <div class="flex-1 overflow-auto bg-[#1e1e1e] relative group">
    <div
      class="absolute inset-0 pointer-events-none shadow-[inset_0_0_20px_rgba(0,0,0,0.2)]"></div>

    @let tab = activeTab();

    @switch (tab) {
      @case ('ts') {
        <app-code
          class="block min-h-full p-4 font-mono text-sm leading-relaxed"
          [code]="path.ts | codeFromUrl | async" />
      }
      @case ('html') {
        <app-code
          class="block min-h-full p-4 font-mono text-sm leading-relaxed"
          [code]="path.html | codeFromUrl | async" />
      }
      @case ('css') {
        @if (path.css) {
          <app-code
            class="block min-h-full p-4 font-mono text-sm leading-relaxed"
            [code]="path.css | codeFromUrl | async" />
        } @else {
          <p class="text-red-500">CSS path not found</p>
        }
      }
      @default never;
    }
  </div>
</div>

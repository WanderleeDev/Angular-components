<button
  type="button"
  commandfor="mydialog"
  command="show-modal"
  class="lg:hidden p-2 rounded-xl text-app-text/70 hover:bg-app-text/5 hover:text-app-text transition-all focus-visible:ring-2 focus-visible:ring-app-accent/50 focus:outline-none"
  aria-label="Toggle navigation menu">
  <span class="material-icons text-2xl">menu</span>
</button>

<dialog
  id="mydialog"
  #menuMobile
  class="group fixed inset-0 z-45 w-full h-full bg-transparent border-0 p-0 m-0 backdrop:bg-black/60 opacity-0 open:opacity-100 starting:open:opacity-0 transition-all duration-300 transition-discrete backdrop:transition-all backdrop:duration-300 backdrop:opacity-0 open:backdrop:opacity-100 starting:open:backdrop:opacity-0 backdrop:backdrop-blur-sm backdrop-blur-none backdrop-filter-none">
  <aside
    class="fixed top-0 bottom-0 left-0 h-full w-72 bg-app-card border-r border-app-border p-5 z-45 transform -translate-x-full group-open:translate-x-0 group-open:starting:-translate-x-full transition-transform duration-300 ease-out lg:static lg:translate-x-0 lg:z-auto flex flex-col pt-20 lg:pt-5 overflow-y-auto">
    <div
      class="px-3 py-2 border-b border-app-border/40 mb-4 flex justify-between items-center">
      <h2 class="text-xs font-bold uppercase tracking-widest text-app-accent">
        Categories
      </h2>
      <form method="dialog">
        <button
          type="button"
          commandfor="mydialog"
          command="close"
          class="lg:hidden p-1.5 rounded-lg text-app-text/60 hover:bg-app-text/5 hover:text-app-text focus:outline-none focus-visible:ring-2 focus-visible:ring-app-accent/50"
          aria-label="Close menu">
          <span class="material-icons text-xl">close</span>
        </button>
      </form>
    </div>

    <nav class="flex flex-col gap-1">
      @for (nav of navList(); track nav.title) {
      <a
        (click)="hideMenu()"
        [routerLink]="'/catalog/' + nav.title"
        routerLinkActive="bg-app-accent/8! text-app-accent! border-app-accent/20! shadow-[0_0_15px_rgba(var(--accent),0.02)] font-semibold"
        class="flex items-center gap-3.5 px-4 h-12 rounded-xl text-app-text/70 font-medium border border-transparent hover:bg-app-accent/5 hover:text-app-text/90 hover:border-app-accent/10 transition-all duration-200 focus:outline-none focus-visible:ring-2 focus-visible:ring-app-accent/50">
        <div class="text-app-text/50 flex items-center justify-center">
          <span class="material-icons text-xl">{{ nav.icon }}</span>
        </div>
        <span class="capitalize text-sm tracking-wide">{{ nav.title }}</span>
      </a>
      }@empty {
      <div
        class="flex flex-col items-center justify-center py-6 text-app-text/40 gap-1.5 select-none">
        <span class="material-icons text-2xl">category</span>
        <span class="text-xs font-semibold">No categories found</span>
      </div>
      }
    </nav>
  </aside>
</dialog>
